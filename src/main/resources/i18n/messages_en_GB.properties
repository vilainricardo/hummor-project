trend.rule.STABLE.BOM={0}: the average is stable and the recent half is above 8 (recent mean {1}).
trend.rule.STABLE.ALERTA={0}: the average is stable with the recent half between 6 and 8 (recent mean {1}).
trend.rule.STABLE.PERIGO={0}: the average is stable but the recent half is below 6 (recent mean {1}).
trend.rule.RISES.BOM={0}: the average rose and the recent half is at or above 6 (recent mean {1}).
trend.rule.RISES.PERIGO={0}: the average rose but the recent half is still below 6 (recent mean {1}).
