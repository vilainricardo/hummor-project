trend.rule.FALLS.ALERTA={0}: la media bajó, pero la mitad reciente sigue por encima de 6 (media reciente {1}).
trend.rule.FALLS.PERIGO={0}: la media bajó y la mitad reciente está en o por debajo de 6 (media reciente {1}).
trend.rule.STABLE.BOM={0}: la media se mantiene y la mitad reciente está por encima de 8 (media reciente {1}).
trend.rule.STABLE.ALERTA={0}: la media se mantiene con la mitad reciente entre 6 y 8 (media reciente {1}).
trend.rule.STABLE.PERIGO={0}: la media se mantiene, pero la mitad reciente está por debajo de 6 (media reciente {1}).
trend.rule.RISES.BOM={0}: la media subió y la mitad reciente está en o por encima de 6 (media reciente {1}).
trend.rule.RISES.PERIGO={0}: la media subió, pero la mitad reciente sigue por debajo de 6 (media reciente {1}).
