trend.rule.FALLS.ALERTA={0}: a média desceu, mas a metade recente mantém-se acima de 6 (média recente {1}).
trend.rule.FALLS.PERIGO={0}: a média desceu e a metade recente está igual ou abaixo de 6 (média recente {1}).
trend.rule.STABLE.BOM={0}: a média manteve-se e a metade recente está acima de 8 (média recente {1}).
trend.rule.STABLE.ALERTA={0}: a média manteve-se com a metade recente entre 6 e 8 (média recente {1}).
trend.rule.STABLE.PERIGO={0}: a média manteve-se, mas a metade recente está abaixo de 6 (média recente {1}).
trend.rule.RISES.BOM={0}: a média subiu e a metade recente está igual ou acima de 6 (média recente {1}).
trend.rule.RISES.PERIGO={0}: a média subiu, mas a metade recente continua abaixo de 6 (média recente {1}).
