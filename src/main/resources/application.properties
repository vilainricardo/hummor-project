spring.application.name=hummor-project

# PostgreSQL — alinhado ao SAD §3.3 (MindSignal).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mindsignal}
spring.datasource.username=${DATABASE_USER:mindsignal}
spring.datasource.password=${DATABASE_PASSWORD:mindsignal}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway — join table user_tags / demais DDL versionado (Hibernate continua em validate).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=existing schema before migrations

# Internacionalização (mensagens da API + Bean Validation)
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
