# Perfil local H2 — arranque: spring-boot.run.profiles=h2 ou SPRING_PROFILES_ACTIVE=h2
# EN: File DB under ./data/ (ignored by Git). Hibernate builds schema; Flyway off (baseline/migrations target PostgreSQL).
# PT-BR: Base em ficheiro em ./data/ (ignorada pelo Git). Esquema via Hibernate; Flyway desligado.

spring.datasource.url=jdbc:h2:file:./data/hummor-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ao abrir http://localhost:8080/ ir para Swagger UI (mesmo springdoc.swagger-ui.path)
app.swagger.redirect-root=true
