# Perfil implícito de testes: memória local, DDL compatível com convenções Postgres (modo H2).
spring.datasource.url=jdbc:h2:mem:mindsignal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
